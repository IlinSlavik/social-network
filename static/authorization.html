<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="/static/style/authorization_style.css">
</head>
<body>
    <form class="block" id="autorization">
        <h2 class="form-title">Вход в аккаунт</h2>

        <button class="block" type="button" id="create-account">Создать аккаунт</button>
    </form>

    <script src="/static/scripts/authorization_script.js"></script>

</html>
