<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/static/style/register_style.css">
</head>
<body>
    <form class="block" id="registration">
        <h2 class="form-title">Создание аккаунта</h2>
        
        <div class="name-row">
            <input type="text" placeholder="Имя" id="first-name" required>
            <input type="text" placeholder="Фамилия" id="last-name" required>
        </div>
        
        <input type="text" placeholder="Логин" id="login" required>
        <input type="password" placeholder="Пароль" id="password" required>
        <input type="password" placeholder="Повторите пароль" id="confirm-password" required>
        
        <button class="white-btn" type="submit">Создать аккаунт</button>
        <button class="block" type="button" id="back-to-login">Вернуться к входу</button>
    </form>

    <script src="/static/scripts/register_script.js"></script>
</body>
</html>
